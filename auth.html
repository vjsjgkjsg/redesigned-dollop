<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Вход — Педагогический портал СКО</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Sora:wght@300;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Nunito',sans-serif;background:#000e2a;color:#fff;overflow-x:hidden}

/* ── BG ── */
.bg-scene{position:fixed;inset:0;z-index:0;background:linear-gradient(145deg,#000e2a,#001840 40%,#002255 70%,#001030);overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(65px);opacity:.3;animation:orb-drift linear infinite}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,#1565c0,transparent);top:-120px;left:-100px;animation-duration:20s}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,#003399,transparent);bottom:-80px;right:-80px;animation-duration:25s;animation-direction:reverse}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,#c8a04055,transparent);top:35%;left:55%;animation-duration:30s}
@keyframes orb-drift{0%{transform:translate(0,0)scale(1)}33%{transform:translate(28px,-18px)scale(1.07)}66%{transform:translate(-18px,28px)scale(.93)}100%{transform:translate(0,0)scale(1)}}
.grid-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(25,118,210,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(25,118,210,.05) 1px,transparent 1px);background-size:60px 60px}
#stars{position:absolute;inset:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.06}50%{opacity:.5}}

/* ── LAYOUT ── */
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px}

/* ── CARD ── */
.auth-card{background:rgba(255,255,255,.055);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.11);border-radius:30px;padding:38px 36px 32px;width:100%;max-width:440px;box-shadow:0 40px 100px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1);animation:card-rise .65s cubic-bezier(.34,1.46,.64,1) both;position:relative;overflow:hidden}
@keyframes card-rise{from{opacity:0;transform:translateY(36px)scale(.95)}to{opacity:1;transform:none}}
.card-shine{position:absolute;top:0;left:-220%;width:220%;height:100%;background:linear-gradient(105deg,transparent 38%,rgba(255,255,255,.055) 50%,transparent 62%);animation:shine 5s ease-in-out infinite;pointer-events:none}
@keyframes shine{0%{left:-220%}25%,100%{left:220%}}

/* ── APP ICON ── */
.app-icon-wrap{text-align:center;margin-bottom:20px}
.app-icon{width:82px;height:82px;margin:0 auto 14px;background:linear-gradient(135deg,#003d82,#1976D2);border-radius:24px;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 0 0 0 rgba(25,118,210,.5),0 12px 40px rgba(0,51,102,.55);animation:icon-pulse 3s ease-in-out infinite}
@keyframes icon-pulse{0%,100%{box-shadow:0 0 0 0 rgba(25,118,210,.4),0 12px 40px rgba(0,51,102,.55)}50%{box-shadow:0 0 0 14px rgba(25,118,210,0),0 12px 40px rgba(0,51,102,.6)}}
.app-icon svg{width:50px;height:50px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}
.app-icon-badge{position:absolute;top:-6px;right:-6px;width:26px;height:26px;background:linear-gradient(135deg,#c8a040,#f0c040);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 2px 10px rgba(200,160,64,.6);border:2px solid rgba(0,20,60,.5);animation:badge-spin 6s linear infinite}
@keyframes badge-spin{to{transform:rotate(360deg)}}
.app-icon-wrap h1{font-family:'Sora',sans-serif;font-size:1.05rem;font-weight:700;color:#fff;line-height:1.3;margin-bottom:3px}
.app-icon-wrap p{font-size:11px;color:rgba(255,255,255,.38);font-weight:700;letter-spacing:.6px}

/* ── STEPS INDICATOR ── */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:24px}
.step-dot{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:rgba(255,255,255,.35);transition:all .3s;flex-shrink:0}
.step-dot.active{background:linear-gradient(135deg,#003366,#1976D2);border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(0,51,102,.5)}
.step-dot.done{background:linear-gradient(135deg,#16a34a,#22c55e);border-color:transparent;color:#fff}
.step-dot.done::after{content:'✓'}
.step-dot.active span,.step-dot:not(.done):not(.active) span{display:block}
.step-dot.done span{display:none}
.step-line{width:32px;height:2px;background:rgba(255,255,255,.1);transition:background .3s;flex-shrink:0}
.step-line.done{background:linear-gradient(90deg,#22c55e,#1976D2)}
.step-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.35);text-align:center;margin-bottom:20px;letter-spacing:.4px;transition:color .3s}

/* ── TABS (for login vs register) ── */
.auth-tabs{display:flex;gap:4px;background:rgba(0,0,0,.22);border-radius:17px;padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:10px 8px;border:none;background:transparent;color:rgba(255,255,255,.45);border-radius:14px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;transition:all .25s}
.auth-tab.active{background:linear-gradient(135deg,#003366,#1976D2);color:#fff;box-shadow:0 4px 16px rgba(0,51,102,.5)}

/* ── PANELS ── */
.auth-panel{display:none}
.auth-panel.active{display:block;animation:panel-in .3s ease both}
@keyframes panel-in{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}

/* ── STEP PANELS ── */
.step-panel{display:none}
.step-panel.active{display:block;animation:panel-in .3s ease both}

/* ── FIELD ── */
.field-group{margin-bottom:14px;position:relative}
.field-label{display:block;font-size:10px;font-weight:800;color:rgba(255,255,255,.4);letter-spacing:.9px;text-transform:uppercase;margin-bottom:6px}
.field-input{width:100%;padding:12px 42px 12px 15px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:13px;color:#fff;font-family:inherit;font-size:14px;outline:none;transition:all .2s}
.field-input::placeholder{color:rgba(255,255,255,.2)}
.field-input:focus{border-color:#1976D2;background:rgba(25,118,210,.1);box-shadow:0 0 0 4px rgba(25,118,210,.12)}
.field-input.error{border-color:#ef4444!important;background:rgba(239,68,68,.08)!important}
.field-input.ok{border-color:#22c55e!important}
/* show/hide password toggle */
.eye-btn{position:absolute;right:13px;bottom:11px;background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:18px;padding:2px;transition:color .2s;line-height:1}
.eye-btn:hover{color:rgba(255,255,255,.7)}

/* ── PASSWORD STRENGTH ── */
.pwd-strength{margin:-6px 0 12px}
.pwd-bars{display:flex;gap:4px;margin-bottom:4px}
.pwd-bar{height:3px;flex:1;border-radius:2px;background:rgba(255,255,255,.09);transition:background .28s}
.pwd-hint{font-size:10px;color:rgba(255,255,255,.3);font-weight:700}

/* ── PIN ── */
.pin-label{display:block;font-size:10px;font-weight:800;color:rgba(255,255,255,.4);letter-spacing:.9px;text-transform:uppercase;margin-bottom:12px}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:14px}
.pin-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.22);background:transparent;transition:all .22s cubic-bezier(.34,1.56,.64,1)}
.pin-dot.filled{background:linear-gradient(135deg,#c8a040,#f0c040);border-color:transparent;box-shadow:0 0 14px rgba(200,160,64,.6);transform:scale(1.25)}
.pin-dot.err{background:#ef4444;border-color:transparent;box-shadow:0 0 14px rgba(239,68,68,.6)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:4px}
.np-btn{width:100%;aspect-ratio:1.55/1;background:rgba(255,255,255,.068);border:1px solid rgba(255,255,255,.1);border-radius:13px;color:#fff;font-family:'Sora',sans-serif;font-size:18px;font-weight:700;cursor:pointer;transition:all .14s;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
.np-btn sub{font-size:7px;color:rgba(255,255,255,.32);letter-spacing:.3px;margin-top:-2px}
.np-btn:hover{background:rgba(25,118,210,.22);border-color:rgba(25,118,210,.4);transform:translateY(-2px)}
.np-btn:active{transform:scale(.91)}
.np-btn.del{font-size:17px;color:rgba(255,255,255,.45)}
.np-btn.del:hover{color:#ef4444;border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.09)}
.np-ph{visibility:hidden;pointer-events:none}
.np-ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.18);transform:scale(0);animation:rip .4s ease;pointer-events:none}
@keyframes rip{to{transform:scale(4.5);opacity:0}}
.pin-note{font-size:11px;color:rgba(255,255,255,.25);text-align:center;margin-top:7px;line-height:1.5}

/* ── MSG ── */
.auth-msg{padding:10px 14px;border-radius:12px;font-size:13px;font-weight:700;margin-bottom:12px;display:none}
.auth-msg.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);color:#fca5a5;display:block;animation:msg-pop .25s cubic-bezier(.34,1.56,.64,1)}
.auth-msg.success{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);color:#86efac;display:block;animation:msg-pop .25s cubic-bezier(.34,1.56,.64,1)}
.auth-msg.info{background:rgba(25,118,210,.12);border:1px solid rgba(25,118,210,.35);color:#93c5fd;display:block;animation:msg-pop .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes msg-pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}

/* ── SUBMIT ── */
.auth-submit{width:100%;padding:14px;background:linear-gradient(135deg,#003366,#1976D2);border:none;border-radius:15px;color:#fff;font-family:inherit;font-size:15px;font-weight:900;cursor:pointer;transition:all .2s;box-shadow:0 6px 24px rgba(0,51,102,.4);position:relative;overflow:hidden;margin-top:6px}
.auth-submit:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,51,102,.52)}
.auth-submit:active{transform:scale(.97)}
.auth-submit:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.btn-spinner{display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-submit.loading .btn-text{display:none}
.auth-submit.loading .btn-spinner{display:block}

/* ── BACK STEP ── */
.step-back{background:none;border:none;color:rgba(255,255,255,.35);font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;padding:6px 0;transition:color .2s;display:flex;align-items:center;gap:5px;margin-bottom:14px}
.step-back:hover{color:rgba(255,255,255,.7)}

/* ── SUCCESS ── */
.auth-success{text-align:center;padding:10px 0;display:none}
.auth-success.show{display:block;animation:card-rise .5s cubic-bezier(.34,1.46,.64,1)}
.success-circle{width:82px;height:82px;margin:0 auto 18px;background:linear-gradient(135deg,#16a34a,#22c55e);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;animation:s-pop .5s cubic-bezier(.34,1.56,.64,1) both,s-glow 2.2s 1s ease-in-out infinite}
@keyframes s-pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes s-glow{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 18px rgba(34,197,94,0)}}
.auth-success h2{font-family:'Sora',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:6px}
.auth-success p{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:20px}
.go-btn{display:inline-block;padding:13px 38px;background:linear-gradient(135deg,#003366,#1976D2);color:#fff;border:none;border-radius:15px;font-family:inherit;font-size:14px;font-weight:900;text-decoration:none;cursor:pointer;box-shadow:0 6px 24px rgba(0,51,102,.4);transition:all .2s}
.go-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,51,102,.52)}

/* ── DB BADGE ── */
.db-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:rgba(255,255,255,.3);margin-bottom:16px;padding:4px 11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px}
.db-dot{width:7px;height:7px;border-radius:50%;background:#64748b;animation:db-pulse 2s ease-in-out infinite}
.db-dot.online{background:#22c55e}
.db-dot.offline{background:#f59e0b}
@keyframes db-pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── SHAKE ── */
@keyframes shake{0%,100%{transform:none}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}

/* ── USERS FOOTER ── */
.users-footer{margin-top:18px;padding-top:13px;border-top:1px solid rgba(255,255,255,.07);display:none}
.uf-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.5px;text-align:center;margin-bottom:8px}
.users-avs{display:flex;justify-content:center}
.u-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#00266a,#1976D2);border:2px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;margin-left:-5px;cursor:default;transition:transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.u-av:first-child{margin-left:0}
.u-av:hover{transform:translateY(-3px)}
.u-av-more{background:rgba(255,255,255,.09);font-size:9px;color:rgba(255,255,255,.45)}

@media(max-width:460px){.auth-card{padding:26px 18px 24px}.np-btn{font-size:16px}.app-icon{width:70px;height:70px}}
.field-hint{font-size:11px;color:rgba(255,255,255,.45);margin-top:4px;padding-left:2px;}
</style>
</head>
<body>

<div class="bg-scene">
  <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
  <div class="grid-lines"></div><div id="stars"></div>
</div>

<div class="page">
<div class="auth-card">
  <div class="card-shine"></div>

  <!-- ICON -->
  <div class="app-icon-wrap" id="auth-logo">
    <div class="app-icon">
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 14C8 12.9 8.9 12 10 12H24V40H10C8.9 40 8 39.1 8 38V14Z" fill="rgba(255,255,255,0.92)"/>
        <path d="M44 14C44 12.9 43.1 12 42 12H28V40H42C43.1 40 44 39.1 44 38V14Z" fill="rgba(255,255,255,0.75)"/>
        <rect x="24" y="12" width="4" height="28" fill="rgba(255,255,255,0.5)"/>
        <rect x="11" y="19" width="11" height="1.5" rx=".75" fill="rgba(25,118,210,0.6)"/>
        <rect x="11" y="23" width="9" height="1.5" rx=".75" fill="rgba(25,118,210,0.5)"/>
        <rect x="11" y="27" width="10" height="1.5" rx=".75" fill="rgba(25,118,210,0.5)"/>
        <rect x="11" y="31" width="8" height="1.5" rx=".75" fill="rgba(25,118,210,0.4)"/>
        <rect x="29" y="19" width="11" height="1.5" rx=".75" fill="rgba(25,118,210,0.5)"/>
        <rect x="29" y="23" width="9" height="1.5" rx=".75" fill="rgba(25,118,210,0.4)"/>
        <rect x="29" y="27" width="10" height="1.5" rx=".75" fill="rgba(25,118,210,0.4)"/>
        <path d="M40 7L41.12 9.88L44 11L41.12 12.12L40 15L38.88 12.12L36 11L38.88 9.88L40 7Z" fill="#f0c040"/>
        <path d="M12 8L12.75 9.88L14.5 10.5L12.75 11.12L12 13L11.25 11.12L9.5 10.5L11.25 9.88L12 8Z" fill="rgba(255,255,255,0.7)"/>
      </svg>
      <div class="app-icon-badge">✦</div>
    </div>
    <h1>Цифровой навигатор педагога</h1>
    <p>ПЕТРОПАВЛОВСК · СКО</p>
  </div>

  <!-- DB STATUS -->
  <div style="text-align:center">
    <div class="db-badge" id="db-badge">
      <div class="db-dot" id="db-dot"></div>
      <span id="db-status-text">Подключение...</span>
    </div>
  </div>

  <!-- TABS -->
  <div class="auth-tabs" id="auth-tabs">
    <button class="auth-tab active" onclick="switchMode('login')" id="tab-login">🔑 Войти</button>
    <button class="auth-tab" onclick="switchMode('register')" id="tab-register">✨ Регистрация</button>
  </div>

  <!-- ═══════════ LOGIN MODE ═══════════ -->
  <div class="auth-panel active" id="panel-login">

    <!-- STEP 1: login + password -->
    <div class="step-panel active" id="login-step1">
      <div id="msg-login" class="auth-msg"></div>
      <div class="field-group">
        <label class="field-label">Логин</label>
        <input id="login-name" type="text" class="field-input" placeholder="Ваш логин" autocomplete="username"/>
      </div>
      <div class="field-group">
        <label class="field-label">Пароль</label>
        <input id="login-pwd" type="password" class="field-input" placeholder="Введите пароль" autocomplete="current-password"/>
        <button type="button" class="eye-btn" onclick="toggleEye('login-pwd',this)">👁</button>
      </div>
      <button class="auth-submit" id="btn-login-step1" onclick="loginStep1()">
        <span class="btn-text">Далее →</span><span class="btn-spinner"></span>
      </button>
    </div>

    <!-- STEP 2: PIN -->
    <div class="step-panel" id="login-step2">
      <button class="step-back" onclick="backToStep('login',1)">← Назад</button>
      <div id="msg-login-pin" class="auth-msg"></div>
      <div style="text-align:center;margin-bottom:18px">
        <div style="font-size:13px;color:rgba(255,255,255,.55);margin-bottom:4px">Добро пожаловать,</div>
        <div id="login-welcome-name" style="font-size:18px;font-weight:900;color:#fff"></div>
      </div>
      <span class="pin-label" style="text-align:center;display:block">Введите PIN-код</span>
      <div class="pin-dots" id="login-pin-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div>
        <div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div class="numpad" id="login-numpad"></div>
      <button class="auth-submit" id="btn-login-step2" onclick="loginStep2()">
        <span class="btn-text">Войти в портал 🏫</span><span class="btn-spinner"></span>
      </button>
    </div>

  </div>

  <!-- ═══════════ REGISTER MODE ═══════════ -->
  <div class="auth-panel" id="panel-register">

    <!-- STEP 1: login + password -->
    <div class="step-panel active" id="reg-step1">
      <div id="msg-reg" class="auth-msg"></div>
      <div class="field-group">
        <label class="field-label">Придумайте логин <span style="color:#8b949e;font-weight:400">(для входа)</span></label>
        <input id="reg-name" type="text" class="field-input" placeholder="Напр.: aigul_m" maxlength="30" autocomplete="username" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_.-]/g,'')"/>
        <div class="field-hint">Только латиница, цифры, _ . -</div>
      </div>
      <div class="field-group">
        <label class="field-label">Ваше имя <span style="color:#8b949e;font-weight:400">(отображается в чате)</span></label>
        <input id="reg-display-name" type="text" class="field-input" placeholder="Напр.: Айгуль М." maxlength="30" autocomplete="off"/>
      </div>
      <div class="field-group">
        <label class="field-label">Придумайте пароль</label>
        <input id="reg-pwd" type="password" class="field-input" placeholder="Минимум 6 символов" autocomplete="new-password" oninput="checkPwdStrength(this.value)"/>
        <button type="button" class="eye-btn" onclick="toggleEye('reg-pwd',this)">👁</button>
      </div>
      <div class="pwd-strength" id="pwd-strength" style="display:none">
        <div class="pwd-bars">
          <div class="pwd-bar" id="pb0"></div><div class="pwd-bar" id="pb1"></div>
          <div class="pwd-bar" id="pb2"></div><div class="pwd-bar" id="pb3"></div>
        </div>
        <div class="pwd-hint" id="pwd-hint"></div>
      </div>
      <div class="field-group">
        <label class="field-label">Повторите пароль</label>
        <input id="reg-pwd2" type="password" class="field-input" placeholder="Ещё раз пароль" autocomplete="new-password"/>
        <button type="button" class="eye-btn" onclick="toggleEye('reg-pwd2',this)">👁</button>
      </div>
      <button class="auth-submit" id="btn-reg-step1" onclick="regStep1()">
        <span class="btn-text">Далее — создать PIN →</span><span class="btn-spinner"></span>
      </button>

/* ── SHA-256 hash ── */
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('pedagog_sko_2025_'+str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ══ LOGIN STEP 1 — логин + пароль ══ */
async function loginStep1(){
  const name=document.getElementById('login-name').value.trim();
  const pwd=document.getElementById('login-pwd').value;
  if(!name){showMsg('login','error','Введите логин');return;}
  if(!pwd){showMsg('login','error','Введите пароль');return;}
  setLoading('btn-login-step1',true);
  try{
    // ── SECURITY: проверка блокировки ──
    const block = await SEC.isBlocked(name);
    if(block){
      showMsg('login','error',`🔒 Заблокировано на ${block.mins} мин. Слишком много попыток.`);
      setLoading('btn-login-step1',false);return;
    }
    const user=await dbFindUser(name);
    if(!user){
      await SEC.recordAttempt(name, false, 'password');
      await SEC.checkAndBlock(name);
      showMsg('login','error','Пользователь не найден');setLoading('btn-login-step1',false);return;
    }
    const pwdHash=await sha256(pwd);
    if(user.password_hash && user.password_hash!==pwdHash){
      await SEC.recordAttempt(name, false, 'password');
      const res = await SEC.checkAndBlock(name);
      const warn = res.blocked ? ' 🔒 Аккаунт заблокирован!' : res.remaining<=2 ? ` (осталось: ${res.remaining})` : '';
      showMsg('login','error','Неверный пароль' + warn);
      document.getElementById('login-pwd').classList.add('error');
      setLoading('btn-login-step1',false);return;
    }
    // Password OK — go to PIN step
    state.loginUser=user;
    document.getElementById('login-welcome-name').textContent=user.name;
    setLoading('btn-login-step1',false);
    goToStep('login',2);
    pins.login='';renderDots('login');
  }catch(e){
    showMsg('login','error','Ошибка: '+e.message);setLoading('btn-login-step1',false);
  }
}

/* ══ LOGIN STEP 2 — PIN ══ */
async function loginStep2(){
  if(pins.login.length<4){showMsg('login-pin','error','Введите PIN из 4 цифр');shakeDots('login');return;}
  setLoading('btn-login-step2',true);
  try{
    const pinHash=await sha256(pins.login);
    if(state.loginUser.pin_hash!==pinHash){
      await SEC.pinDelay();
      await SEC.recordAttempt(state.loginUser.login||'', false, 'pin');
      const res = await SEC.checkAndBlock(state.loginUser.login||'');
      const warn = res.blocked ? ' 🔒 Аккаунт заблокирован!' : res.remaining<=2 ? ` (попыток: ${res.remaining})` : '';
      showMsg('login-pin','error','Неверный PIN-код' + warn);
      shakeDots('login');setLoading('btn-login-step2',false);return;
    }
    // ── SESSION: создаём сессию в Supabase, убираем localStorage ──
    await SESSION.createSession({
      id:    state.loginUser.id,
      login: state.loginUser.login || '',
      name:  state.loginUser.name,
      role:  state.loginUser.role || 'teacher'
    });
    tgOnLogin(state.loginUser.login||state.loginUser.name, state.loginUser.name);
    SEC.recordSession(state.loginUser.id, state.loginUser.name, state.loginUser.login||state.loginUser.name);
    SEC.localClear(state.loginUser.login||state.loginUser.name);
    showSuccess('login', state.loginUser.name);
  }catch(e){
    showMsg('login-pin','error','Ошибка: '+e.message);setLoading('btn-login-step2',false);
  }
}

function getDeviceInfo() {
  const ua = navigator.userAgent;
  // Device type
  let device = '🖥 Компьютер';
  if (/Android/i.test(ua))          device = '📱 Android';
  else if (/iPhone/i.test(ua))      device = '📱 iPhone';
  else if (/iPad/i.test(ua))        device = '📱 iPad';
  else if (/Mobile/i.test(ua))      device = '📱 Телефон';
  else if (/Tablet/i.test(ua))      device = '📱 Планшет';
  // OS
  let os = 'Неизвестно';
  if (/Windows NT 10/i.test(ua))    os = 'Windows 10/11';
  else if (/Windows NT 6/i.test(ua)) os = 'Windows 7/8';
  else if (/Windows/i.test(ua))     os = 'Windows';
  else if (/Android ([\d.]+)/i.test(ua)) os = 'Android ' + ua.match(/Android ([\d.]+)/i)[1];
  else if (/iPhone OS ([\d_]+)/i.test(ua)) os = 'iOS ' + ua.match(/iPhone OS ([\d_]+)/i)[1].replace(/_/g,'.');
  else if (/Mac OS X/i.test(ua))    os = 'macOS';
  else if (/Linux/i.test(ua))       os = 'Linux';
  // Browser
  let browser = 'Браузер';
  if (/Edg\//i.test(ua))           browser = 'Edge';
  else if (/OPR\//i.test(ua))      browser = 'Opera';
  else if (/YaBrowser/i.test(ua))  browser = 'Яндекс Браузер';
  else if (/Chrome/i.test(ua))     browser = 'Chrome';
  else if (/Firefox/i.test(ua))    browser = 'Firefox';
  else if (/Safari/i.test(ua))     browser = 'Safari';
  // Time in Astana timezone
  const time = new Date().toLocaleString('ru-RU', {
    timeZone: 'Asia/Almaty',
    day:'2-digit', month:'2-digit', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
  return { device, os, browser, time };
}

      ? 'Вход как администратор. Переход в панель...'
      : (type==='register' ? 'Аккаунт создан. Переход...' : 'Вход выполнен. Переход...');
    setTimeout(() => { window.location.replace(isAdmin ? 'admin.html' : 'index.html'); }, 2200);
  });
  ss.classList.add('show');
}

/* ══ FOOTER ══ */
async function updateFooter(){
  try{
    const count=await dbGetCount();
    const recent=await dbGetRecent(6);
    const footer=document.getElementById('users-footer');
    if(!count){footer.style.display='none';return;}
    footer.style.display='';
    document.getElementById('uf-label').textContent=`В системе: ${count} педаго${count===1?'г':count<5?'га':'гов'}`;
    document.getElementById('users-avs').innerHTML=
      recent.map((u,i)=>`<div class="u-av" style="z-index:${10-i}" title="${u.name}">${u.name.charAt(0).toUpperCase()}</div>`).join('')+
      (count>6?`<div class="u-av u-av-more">+${count-6}</div>`:'');
  }catch(e){}
}

/* ══ KEYBOARD ══ */
document.addEventListener('keydown',e=>{
  if(document.getElementById('success-screen').classList.contains('show'))return;
  const activePanel=document.querySelector('.auth-panel.active')?.id;
  const activeStep=document.querySelector('.auth-panel.active .step-panel.active')?.id;
  // Only handle numpad keys when on PIN steps
  if(activeStep==='login-step2'||activeStep==='reg-step2'){
    const key=activePanel==='panel-login'?'login':'register';
    if(e.key>='0'&&e.key<='9')updPin(key,e.key);
    else if(e.key==='Backspace')updPin(key,'del');
    else if(e.key==='Enter') activeStep==='login-step2'?loginStep2():regStep2();
  } else {
    if(e.key==='Enter'){
      if(activeStep==='login-step1') loginStep1();
      else if(activeStep==='reg-step1') regStep1();
    }
  }
});

/* ══ INPUT CLEANUP ══ */
['login-name','login-pwd','reg-name','reg-display-name','reg-pwd','reg-pwd2'].forEach(id=>{
  const el=document.getElementById(id);
  if(el) el.addEventListener('input',function(){this.classList.remove('error');});
});

/* ══ INIT ══ */
(async function(){
  await updateFooter();
  // If already logged in — show note
  SESSION.getUser().then(user => {
    if(!user) return;
    const note=document.createElement('div');
    note.style.cssText='text-align:center;font-size:12px;color:rgba(255,255,255,.4);padding:10px 0 0;line-height:1.8';
    note.innerHTML=`Вы вошли как <b style="color:rgba(255,255,255,.75)">${user.name}</b> &nbsp;<button style="background:none;border:none;color:#f87171;cursor:pointer;font-family:inherit;font-weight:800;font-size:12px" onclick="SESSION.destroySession().then(()=>location.reload())">Выйти</button>`;
    document.getElementById('panel-login').appendChild(note);
  });
})();
</script>
