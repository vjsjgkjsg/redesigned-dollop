# ══════════════════════════════════════════
# NETLIFY CONFIG — Портал педагога СКО
# ══════════════════════════════════════════

[build]
  publish = "."

# ── SECURITY HEADERS (все страницы) ──
[[headers]]
  for = "/*"
  [headers.values]
    # Запрет встраивания в iframe (clickjacking)
    X-Frame-Options = "DENY"
    # Запрет угадывания MIME типов
    X-Content-Type-Options = "nosniff"
    # XSS защита
    X-XSS-Protection = "1; mode=block"
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Запрет кэширования чувствительных страниц
    Cache-Control = "no-store, no-cache, must-revalidate"
    # Permissions policy — запрет камеры/микрофона/геолокации
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # HSTS — только HTTPS (включить после проверки)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Content Security Policy
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https://*.supabase.co;
      connect-src 'self' https://*.supabase.co https://api.telegram.org;
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
    """

# ── ADMIN ЗАЩИТА — закрыть admin.html от индексации ──
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store, no-cache"

